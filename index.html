<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var activeFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return activeFetch;
            },
            set: function(v) {
              activeFetch = v;
            }
          });
        } catch (e) {
          console.warn("[Fetch Safety Patch Failed] could not patch window.fetch:", e);
        }
      })();
    </script>
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
